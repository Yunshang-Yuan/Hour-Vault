<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hour Vault - 任务板</title>
  <link rel="stylesheet" href="/css/global.css">
</head>
<body>

  <nav class="top-nav">
    <div style="display: flex; align-items: center; gap: 32px;">
      <h2 style="font-weight: 900; letter-spacing: 1px;">⏳</h2>
      <div style="display: flex; gap: 24px; font-weight: 600; color: var(--text-sub);">
        <span style="color: var(--primary-color);">📝 </span>
        <span>🛒 </span>
        <span>⭐ </span>
      </div>
    </div>

    <div style="display: flex; align-items: center; gap: 16px;">
      <div style="font-weight: bold; color: var(--credit-color);">🛡️ 150 </div>
      <div style="font-weight: bold; color: var(--zeal-color);">❤️ 32 </div>
      
      <div style="display: flex; align-items: center; gap: 12px; background: var(--bg-color); padding: 6px 16px; border-radius: 50px;">
        <div style="display: flex; flex-direction: column; align-items: flex-end;">
          <span style="font-size: 14px; font-weight: bold;">雲上淵</span>
          <span style="font-size: 12px; color: var(--text-sub);">Lv.3 (24h)</span>
        </div>
        <div style="width: 36px; height: 36px; border-radius: 50%; background: #dfe6e9;"></div>
      </div>
    </div>
  </nav>

  <main style="padding: 40px; max-width: 1200px; margin: 0 auto;">
    <div class="b-card">
      <h3 style="margin-bottom: 8px;">示例任务：图书馆整理书籍</h3>
      <p style="color: var(--text-sub);">帮助图书管理员完成下午的书籍归档工作。这是第一张符合 BewlyBewly 风格的测试卡片！</p>
    </div>
  </main>

</body>
</html>
